namespace:
  labels:
    project-name: "vcluster-workshop"
    stage: "test"


externalSecrets:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vcluster-workshop-test

  secretStores:
    vcluster-workshop-test:
      kind: ClusterSecretStore
      name: vcluster-workshop-test

  secrets:
    oauth2-credentials:
      secretStoreRef: vcluster-workshop-test
      data:
        - remoteKey: vcluster-workshop-test-oauth2-client-id
          secretKey: client-id
        - remoteKey: vcluster-workshop-test-oauth2-client-secret
          secretKey: client-secret
        - remoteKey: vcluster-workshop-test-oauth2-cookie-secret
          secretKey: cookie-secret

oauth2-proxy:
  config:
    existingSecret: oauth2-credentials
    configFile: |-
      reverse_proxy = true
      redirect_url = "https://vcluster-workshop-test.83.167.196.210.traefik.me/oauth2/callback"
      email_domains = [ "*" ]
      cookie_secure = true
      upstreams = [ "static://200" ]
      provider = "github"
      scope = "read:user user:email read:org"
  ingress:
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-staging
    enabled: true
    path: /oauth2
    pathType: Prefix
    hosts:
      - vcluster-workshop-test.83.167.196.210.traefik.me
    tls:
      - secretName: tls-oauth2-proxy
        hosts:
          - vcluster-workshop-test.83.167.196.210.traefik.me
  metrics:
    serviceMonitor:
      labels:
        monitoring.instance: "vcluster-workshop-test"

