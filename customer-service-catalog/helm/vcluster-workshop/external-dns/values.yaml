externalSecrets:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vcluster-workshop-test

  secretStores:
    vcluster-workshop-test:
      kind: ClusterSecretStore
      name: vcluster-workshop-test

  secrets:
    external-dns-webhook:
      secretStoreRef: vcluster-workshop-test
      data:
        - remoteKey: vcluster-workshop-test-external-dns-project-id
          secretKey: PROJECT_ID
        - remoteKey: vcluster-workshop-test-external-dns-sa-key-json
          secretKey: SA_KEY_JSON

namespace:
  labels:
    project-name: "vcluster-workshop"
    stage: "test"
external-dns:
  txtOwnerId: vcluster-workshop-test
  domainFilters:
    - vcluster-workshop-test.83.167.196.210.traefik.me
  extraArgs:
    - --source=traefik-proxy
  rbac:
    create: true
    additionalPermissions:
      - apiGroups: ["traefik.io"]
        resources:
          - ingressroutes
          - ingressroutetcps
          - ingressrouteudps
          - tlsoptions
          - tlsstores
        verbs: ["get", "watch", "list"]
      - apiGroups: [""]
        resources:
          - "namespaces"
        verbs: ["get", "watch", "list"]
  extraVolumes:
    - name: stackit-sa-authentication
      secret:
        secretName: external-dns-webhook
        items:
          - key: SA_KEY_JSON
            path: sa_key.json
  global:
    security:
      allowInsecureImages: true
  provider:
    webhook:
      image:
        repository: ghcr.io/stackitcloud/external-dns-stackit-webhook
        tag: v0.3.6
      extraVolumeMounts:
        - name: stackit-sa-authentication
          mountPath: /var/run/secrets/stackit
      env:
        - name: AUTH_KEY_PATH
          value: /var/run/secrets/stackit/sa_key.json
        - name: PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: external-dns-webhook
              key: PROJECT_ID
  serviceMonitor:
    additionalLabels:
      monitoring.instance: "vcluster-workshop-test"
