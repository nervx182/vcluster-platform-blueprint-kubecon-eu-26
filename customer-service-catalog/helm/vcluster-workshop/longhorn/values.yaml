longhorn:
  metrics:
    serviceMonitor:
      additionalLabels:
        monitoring.instance: "vcluster-workshop-test"
  defaultSettings:
    defaultReplicaCount: "1"
  persistence:
    defaultClass: true
    defaultClassReplicaCount: 1
  ingress:
    ingressClassName: traefik
    host: vcluster-workshop-test.83.167.196.210.traefik.me
    tls: true
    tlsSecret: tls-longhorn
    path: "/longhorn(/|$)(.*)" # see path problems https://github.com/longhorn/longhorn/issues/1745
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-staging

namespace:
  labels:
    project-name: "vcluster-workshop"
    stage: "test"
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
