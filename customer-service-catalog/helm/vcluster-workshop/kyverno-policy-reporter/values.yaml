namespace:
  labels:
    project-name: "vcluster-workshop"
    stage: "test"
policy-reporter:
  replicaCount: 1
  metrics:
    enabled: true
  monitoring:
    serviceMonitor:
      labels:
        monitoring.instance: "vcluster-workshop-test"
  ui:
    enabled: true
    ingress:
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
      hosts:
        - host: vcluster-workshop-test.83.167.196.210.traefik.me
          paths:
            - path: "/kyverno"
              pathType: Prefix
      tls:
        - secretName: tls-kyverno-ui
          hosts:
            - vcluster-workshop-test.83.167.196.210.traefik.me
